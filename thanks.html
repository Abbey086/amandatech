<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Amanda Technologies</title>
    <meta role="description" content="Website developer in Uganda, Kampala for affordable and professional website design and development and grahics design"

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">

    <link
      href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@300..700&family=Special+Gothic+Expanded+One&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css"
      integrity="sha512-XcIsjKMcuVe0Ucj/xgIXQnytNwBttJbNjltBV18IOnru2lDPe9KRRyvCXw6Y5H415vbBLRm8+q6fmLUU7DfO6Q=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script src="3.4.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <style>
      * {
        font-family: "Red Hat Text", sans-serif;
      }

      body {
        overflow: hidden;
        background: #f9fafb;
        max-height: 100dvh;
        width: 100px;
      }

      .panel {
        position: absolute;
        width: 100%;
        height: 100dvh;
        max-height: 100dvh;
        top: 0;
        left: 0;
        display: grid;
        place-items: center;
        overflow-x: hidden;
        opacity: 0;
        pointer-events: none;
      }

      .panel.active {
        opacity: 1;
        pointer-events: auto;
      }

      .reveal-mask {
        overflow: hidden;
        padding-block: 70px 20px;
      }
      .reveal-mask.np {
        padding-block: 0;
      }

      .spring-heading {
        font-family: "Special Gothic Expanded One", sans-serif;
        font-size: 4.5rem;
        text-align: center;
        font-weight: 800;
        line-height: 1.2;
      }
      @media screen and (max-width: 490px) {
        .spring-heading{
          font-size: 2.8rem;
        }
      }
      .spring-heading span {
        font-family: "Special Gothic Expanded One", sans-serif;
      }
      .word {
        display: inline-block;
        white-space: nowrap;
      }

      .char {
        display: inline-block;
      }

      .bg-sky-4000 {
        color: oklch(74.6% 0.16 232.661);
      }

      @keyframes levitate {
        0%,
        100% {
          transform: translateY(0) rotate(-3deg);
        }
        50% {
          transform: translateY(-18px) rotate(3deg);
        }
      }
      @keyframes levitate-r {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-18px);
        }
      }

      .animate-levitate {
        animation: levitate 4s ease-in-out infinite;
      }
      .animate-levitate-rotate {
        animation: levitate-r 4s ease-in-out infinite;
        transform-origin: center;
      }

      .section-nav {
        position: fixed;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        gap: 12px;
        z-index: 9999;
      }

      .section-nav button:hover {
        background-color: black;
        color: white;
      }
      .section-nav button {
        background: rgb(201, 201, 201);
        width: 40px;
        height: 40px;
        border-radius: 50%;
        font-size: 18px;
      }

/* MOBILE ONLY — does not touch desktop */
@media (max-width: 768px) {
  html, body {
    margin: 0;
    padding: 0;
    height: auto;
    overflow-y: auto;
    scroll-snap-type: y mandatory;
  }

  body {
    display: block !important; /* kill flex interference */
  }

  .panel {
    position: relative !important;  /* restore flow */
    height: 100vh;
    width: 100vw;
    scroll-snap-align: start;
    opacity: 1 !important;
    pointer-events: auto !important;
  }
  .floating-click{
    position: absolute;
  }
  .section-nav{
    display: none;
  }

  /* Footer should behave like a normal section */
  #footer {
    position: relative !important;
    scroll-snap-align: start;
    margin-top: 0;
  }
}
    </style>
  </head>

  <body class="snap-y w-screen snap-mandatory">
    <nav
      class="fixed bg-white z-[3456] bottom-0 py-4 w-screen left-0 px-4 md:px-16 flex justify-between items-center"
    >
      <svg
        class="fill-black hover:fill-sky-400 transition md:w-12 md:h-12 w-9 h-9"
        fill="black"
        xmlns="http://www.w3.org/2000/svg"
        xmlns:svg="http://www.w3.org/2000/svg"
        xmlns:xlink="http://www.w3.org/1999/xlink"
        viewBox="0 0 591.56 703.47"
        preserveAspectRatio="xMidYMid meet"
      >
        <g
          transform="matrix(1, 0, 0, 1, 295.7778015136719, 351.73541259765625)"
        >
          <path
            d="M-0,-349.23 C-161.97,-349.23 -293.27,-217.93 -293.27,-55.96 C-293.27,80.17 -200.38,194.3 -74.62,227.36 C-92.92,183.22 -103.13,134.87 -103.13,84.11 C-103.13,-16.91 -62.72,-108.18 2.25,-175.59 C69.75,-107.81 111.52,-14.38 111.52,88.83 C111.52,136.9 101.82,182.5 85.23,224.63 C205.62,188.11 293.27,76.36 293.27,-55.96 C293.27,-217.93 161.97,-349.23 -0,-349.23 ZM85.23,224.63 C58.25,232.82 29.65,237.31 -0,237.31 C-25.84,237.31 -50.75,233.63 -74.62,227.36 C-55.71,272.96 -28.15,314.08 6.15,348.52 C40.21,313.19 66.96,271.05 85.23,224.63 Z"
            fill-rule="evenodd"
          />
        </g>
      </svg>
      <nav
        class="md:relative fixed md:bottom-0 -bottom-1/2  flex md:flex-row flex-col text-center md:text-left bg-white md:bg-transparent pb-32 md:pb-0 pt-6 md:pt-0 transition-all duration-500 inset-x-0 -z-50 gap-3 w-screen md:w-auto  md:gap-12 text-xl font-semibold uppercase"
        id="nav"
      >
        <div
          id="indicator"
          class="absolute md:inline-block hidden top-0 left-0 bg-sky-300 h-full rounded transition-all duration-300 opacity-0"
        ></div>

        <a href="index.html" class="nav-link relative z-10 px-2 py-2">Home</a>
        <a href="work.html" class="nav-link relative z-10 px-2 py-2"
          >Past Work</a
        >
        <a href="about.html" class="nav-link relative z-10 px-2 py-2">About</a>
      </nav>
      <div class="flex gap-3 items-center flex-row-reverse">
        <i onclick="exter(this)" class="ri-menu-2-line md:hidden font-bold text-2xl"></i>
        <script>
          function exter(n){
            document.getElementById('nav').classList.toggle('bottom-0')
            document.getElementById('nav').classList.toggle('-bottom-1/2')
            n.classList.toggle('ri-menu-2-line')
            n.classList.toggle('ri-close-line')

          }
        </script>
    <a
        class="bg-black hover:bg-sky-500 py-2 px-5 rounded-full text-white"
        href="index.html?contact=1"
        >Talk To Us <i class="ri-send-plane-fill"></i
      ></a>

      </div>
  
    </nav>

    <div class="section-nav">
      <button id="upBtn"><i class="ri-arrow-up-s-line"></i></button>
      <button id="downBtn"><i class="ri-arrow-down-s-line"></i></button>
    </div>

    <!-- SECTIONS -->

    <section  class="panel snap-center active">
      <header class="text-center absolute top-5 md:top-9">AMANDA TECHNOLOGIES</header>
      <div class="reveal-mask -mt-24 md:-mt-12">
        <h1 class="spring-heading mx-2 md:mx-12 ">
          Message <span class="bg-sky-4000">Received</span>! We will<span class="bg-sky-4000">contact</span>,<br /> you soon!
        </h1>
      </div>
      <img
        src="props/click5.png"
        class="animate-levitate fixed bottom-8 md:top-1/2 left-16 w-56 md:w-72"
      />
    </section>


    <script>
      const isMobile = window.innerWidth <= 768;
      const links = document.querySelectorAll(".nav-link");
      const indicator = document.getElementById("indicator");

      links.forEach((link) => {
        link.addEventListener("mouseenter", () => {
          // Make the indicator visible on the first hover
          indicator.classList.remove("opacity-0");

          const rect = link.getBoundingClientRect();
          const parentRect = link.parentElement.getBoundingClientRect();

          indicator.style.width = rect.width + "px";
          indicator.style.height = rect.height + "px";

          indicator.style.transform = `translateX(${rect.left - parentRect.left}px)`;
        });
      });
      document.getElementById("nav").addEventListener("mouseleave", () => {
        indicator.classList.add("opacity-0");
      });
      function splitText(element) {
        function processNode(node) {
          if (node.nodeType === 3) {
            const words = node.textContent.split(/(\s+)/);
            const fragment = document.createDocumentFragment();

            words.forEach((word) => {
              if (word.trim() === "") {
                fragment.appendChild(document.createTextNode(word));
                return;
              }

              const wordSpan = document.createElement("span");
              wordSpan.className = "word";

              [...word].forEach((char) => {
                const charSpan = document.createElement("span");
                charSpan.className = "char";
                charSpan.textContent = char;
                wordSpan.appendChild(charSpan);
              });

              fragment.appendChild(wordSpan);
            });

            node.replaceWith(fragment);
          } else if (node.nodeType === 1) {
            [...node.childNodes].forEach(processNode);
          }
        }

        processNode(element);

        return element.querySelectorAll(".char");
      }

      function springTextIn(element) {
        if (!element.dataset.split) {
          splitText(element);
          element.dataset.split = "true";
        }

        const chars = element.querySelectorAll(".char");
        // explicitly define both the starting AND ending states
        gsap.fromTo(
          chars,
          {
            y: 100,
            opacity: 0,
          },
          {
            y: 0,
            opacity: 1,
            duration: 1.5,
            stagger: 0.05,
            ease: "elastic.out(1,0.4)",
          },
        );
      }

      function springTextOut(element) {
        const chars = element.querySelectorAll(".char");

        gsap.to(chars, {
          y: 140,
          opacity: 0,
          duration: 1.2,
          stagger: 0.04,
          ease: "elastic.in(1,0.45)",
        });
      }

      const panels = document.querySelectorAll(".panel");

      let current = 0;
      let locked = false;

      function showSection(index) {
        if (index < 0 || index >= panels.length) return;
        if (locked) return;

        locked = true;

        const currentPanel = panels[current];
        const nextPanel = panels[index];

        const currentHeading = currentPanel.querySelector(".spring-heading");
        const nextHeading = nextPanel.querySelector(".spring-heading");

        springTextOut(currentHeading);

        setTimeout(() => {
          currentPanel.classList.remove("active");
          nextPanel.classList.add("active");

          springTextIn(nextHeading);

          current = index;

          setTimeout(() => {
            locked = false;
          }, 200);
        }, 100);
        animateFlyIn(index);
      }
      animateFlyIn(0);

      const params = new URLSearchParams(window.location.search);

      const id = params.get("contact");
      if (id) {
        showSection(5);
      }

      function animateFlyIn(i) {
        if (i == 0) {
          const rocket = document.querySelector('img[src="props/rocket.png"]');

          let y = -400; // start above the screen
          let velocity = 2; // initial falling speed
          const gravity = 0.6;
          const floor = window.innerHeight / 2; // where it should land

          function animateQ() {
            velocity += gravity;
            y += velocity;

            if (y >= floor) {
              y = floor;
              velocity *= -0.35; // bounce with energy loss

              if (Math.abs(velocity) < 1) {
                velocity = 0;
                y = floor;
              }
            }

            rocket.style.transform = `translateY(${y}px)`;

            if (velocity !== 0 || y < floor) {
              requestAnimationFrame(animateQ);
            }
          }

          animateQ();
        }
        if (i == 2) {
          const bar = document.querySelector(".bg-sky-500");
          const nodes = bar.querySelectorAll(".h-9");
          const texts = bar.querySelectorAll(".reveal-mask, p");

          gsap.set(bar, {
            transformOrigin: "left",
            scaleX: 0,
          });

          gsap.set(nodes, {
            scale: 0,
          });

          gsap.set(texts, {
            y: 40,
            opacity: 0,
          });

          const tl = gsap.timeline();

          tl.to(bar, {
            scaleX: 1,
            duration: 1,
            ease: "power3.out",
          })

            .to(
              nodes,
              {
                scale: 1,
                duration: 0.5,
                stagger: 0.25,
                ease: "back.out(3)",
              },
              "-=0.2",
            )

            .to(
              texts,
              {
                y: 0,
                opacity: 1,
                duration: 0.6,
                stagger: 0.12,
                ease: "power2.out",
              },
              "-=0.3",
            );
        }
        if (i == 3) {
          const cards = document.querySelectorAll(".scard");

          cards.forEach((card, i) => {
            card.style.top = "400px";

            setTimeout(() => {
              card.animate(
                [
                  { top: "400px" },
                  { top: "-40px" },
                  { top: "10px" },
                  { top: "-5px" },
                  { top: "0px" },
                ],
                {
                  duration: 900,
                  easing: "ease-out",
                  fill: "forwards",
                },
              );
            }, i * 150);
          });
        }
        if (i == 4) {
          const cards = document.querySelectorAll(".project-cards > *");

          cards.forEach((card, i) => {
            card.style.opacity = 0;
          });
          cards.forEach((card, i) => {
            card.style.left = "-600px";

            setTimeout(() => {
              card.style.opacity = 1;
              card.animate(
                [
                  { left: "-600px" },
                  { left: "40px" }, // overshoot
                  { left: "-3px" }, // gravity correction
                  { left: "0px" }, // settle
                ],
                {
                  duration: 700,
                  easing: "linear",
                  fill: "forwards",
                },
              );
            }, i * 200); // stagger
          });
        }
        if (i == 6) {
          var card = document.getElementById("footer");
          card.style.opacity = 0;
          setTimeout(() => {
            card.style.opacity = 0.95;
          }, 2800);
        }
      }

      window.addEventListener("wheel", (e) => {
        if (locked) return;

        if (e.deltaY > 0) {
          showSection(current + 1);
        } else {
          showSection(current - 1);
        }
      });

      window.addEventListener("keydown", (e) => {
        if (e.key === "ArrowDown") showSection(current + 1);
        if (e.key === "ArrowUp") showSection(current - 1);
      });

      document.getElementById("downBtn").onclick = () => {
        showSection(current + 1);
      };

      document.getElementById("upBtn").onclick = () => {
        showSection(current - 1);
      };

      springTextIn(document.querySelector(".panel.active .spring-heading"));

      const imgs = document.querySelectorAll(".floating-click");

      imgs.forEach((img) => {
        let x = Math.random() * (window.innerWidth - img.offsetWidth);
        let y = Math.random() * (window.innerHeight - img.offsetHeight);

        let vx = (Math.random() * 2 + 1) * (Math.random() < 0.5 ? -1 : 1);
        let vy = (Math.random() * 2 + 1) * (Math.random() < 0.5 ? -1 : 1);

        function animate() {
          x += vx;
          y += vy;

          const maxX = window.innerWidth - img.offsetWidth;
          const maxY = window.innerHeight - img.offsetHeight;

          if (x <= 0 || x >= maxX) vx *= -1;
          if (y <= 0 || y >= maxY) vy *= -1;

          img.style.transform = `translate(${x}px, ${y}px)`;

          requestAnimationFrame(animate);
        }

        animate();

        img.addEventListener("mouseenter", () => {
          img.style.transition = "opacity 0.6s";

          img.style.opacity = "0.1";
        });

        img.addEventListener("mouseleave", () => {
          setTimeout(() => (img.style.opacity = "1"), 600);
        });
      });

      // Mobile-only detection

if (isMobile) {
  const panels = document.querySelectorAll(".panel");

  const observerOptions = {
    root: null, // use the viewport
    threshold: 0.5 // trigger when 50% of the panel is visible
  };

  const mobileObserver = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      const panel = entry.target;
      const index = Array.from(panels).indexOf(panel);
      const heading = panel.querySelector('.spring-heading');
      
      // Select only the floating props INSIDE this specific panel
      const localProps = panel.querySelectorAll('.floating-click, img[src="props/rocket.png"]');

      if (entry.isIntersecting) {
        // 1. Reveal the heading text
        if (heading) springTextIn(heading);

        // 2. Show floating props for THIS panel only
        localProps.forEach(prop => {
          gsap.to(prop, { opacity: 1, duration: 0.4 });
          prop.style.pointerEvents = "auto";
        });

        // 3. Trigger the specific internal animations (Rocket drop, cards, etc.)
        // Using your existing logic but scoped to this index
        triggerMobilePanelAnimations(panel, index);

      } else {
        // 1. Hide the heading when it leaves
        if (heading) springTextOut(heading);

        // 2. Hide floating props so they don't overlay other sections
        localProps.forEach(prop => {
          gsap.to(prop, { opacity: 0, duration: 0.3 });
          prop.style.pointerEvents = "none";
        });

        // Reset animation state so it can replay if they scroll back up
        panel.dataset.animated = "false";
      }
    });
  }, observerOptions);

  // Start observing all panels for mobile
  panels.forEach((panel) => mobileObserver.observe(panel));
}

/**
 * Handles the specific constituent animations for each panel on mobile
 */
function triggerMobilePanelAnimations(panel, i) {
  // Prevent double-triggering if already visible
  if (panel.dataset.animated === "true") return;
  panel.dataset.animated = "true";

  // PANEL 0: Rocket Drop Physics
  if (i === 0) {
    const rocket = panel.querySelector('img[src="props/rocket.png"]');
    if (rocket) {
      let y = -400, velocity = 2, gravity = 0.6;
      const floor = window.innerHeight / 2;
      function bounce() {
        velocity += gravity; y += velocity;
        if (y >= floor) { y = floor; velocity *= -0.35; }
        rocket.style.transform = `translateY(${y}px)`;
        if (Math.abs(velocity) > 0.1 || y < floor) requestAnimationFrame(bounce);
      }
      bounce();
    }
  }

  // PANEL 2: GSAP Creative Process Bar
  if (i === 2) {
    const bar = panel.querySelector(".bg-sky-500");
    if (bar) {
      gsap.fromTo(bar, { scaleX: 0 }, { scaleX: 1, duration: 1, ease: "power3.out", transformOrigin: "left" });
      gsap.fromTo(bar.querySelectorAll(".h-9"), { scale: 0 }, { scale: 1, duration: 0.5, stagger: 0.2 });
    }
  }

  // PANEL 3: Service Cards (.scard) Bounce
  if (i === 3) {
    panel.querySelectorAll(".scard").forEach((card, idx) => {
      card.style.top = "400px";
      setTimeout(() => {
        card.animate(
          [{ top: "400px" }, { top: "-20px" }, { top: "0px" }],
          { duration: 800, easing: "ease-out", fill: "forwards" }
        );
      }, idx * 150);
    });
  }

  // PANEL 4: Project Cards Slide
  if (i === 4) {
    panel.querySelectorAll(".project-cards > *").forEach((card, idx) => {
      card.animate(
        [{ left: "-100%", opacity: 0 }, { left: "0%", opacity: 1 }],
        { duration: 600, delay: idx * 200, easing: "ease-out", fill: "forwards" }
      );
    });
  }
}
    </script>
